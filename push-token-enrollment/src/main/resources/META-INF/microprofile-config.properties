# SPML transport: mock (CI/local) or soap (lab/staging)
enrollment.spml.transport=mock
enrollment.spml.endpoint=https://prov.example.net/spml
enrollment.spml.connect-timeout-ms=2000
enrollment.spml.read-timeout-ms=5000
enrollment.spml.service-indication=PushNotificationAppV1
enrollment.spml.subscriber-id-prefix=tel:

# MSISDN normalization
enrollment.msisdn.default-country-code=1
enrollment.msisdn.strip-trunk-prefix=true
enrollment.msisdn.trunk-prefix=0
enrollment.msisdn.max-device-token-length=4096

# Auth — fail closed; lab uses static bearer from env
enrollment.auth.enabled=true
enrollment.auth.static-bearer=${ENROLLMENT_API_BEARER:}
enrollment.auth.required-scope=push.enroll
enrollment.auth.allow-admin-scope=true

enrollment.rate-limit.per-second=50
